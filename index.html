<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Name Icons</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://kit.fontawesome.com/368b528bb1.js" crossorigin="anonymous"></script>

<style>
    body {
        margin: 0;
        background-color: #1f1f1f;
    }

    .container {
        text-align: center;
        padding: 60px 0;
    }

    i {
        font-size: 80px;
        margin: 8px;
    }

    .blue {
        color: #2ec4f1;
    }

    .red {
        color: #ff4d4d;
    }
</style>
</head>

<body>

<div class="container">

    <div>
        <i class="fa-solid fa-l red"></i>
        <i class="fa-solid fa-i blue"></i>
        <i class="fa-solid fa-m red"></i>
        <i class="fa-solid fa-w blue"></i>
        <i class="fa-solid fa-e red"></i>
        <i class="fa-solid fa-l blue"></i>
        <i class="fa-solid fa-l red"></i>
    </div>

    <div>
        <i class="fa-solid fa-a blue"></i>
        <i class="fa-solid fa-m red"></i>
        <i class="fa-solid fa-a blue"></i>
        <i class="fa-solid fa-t red"></i>
        <i class="fa-solid fa-o blue"></i>
        <i class="fa-solid fa-s red"></i>
        <i class="fa-solid fa-a blue"></i>
    </div>

    <div>
        <i class="fa-solid fa-o red"></i>
        <i class="fa-solid fa-m blue"></i>
        <i class="fa-solid fa-b red"></i>
        <i class="fa-solid fa-a blue"></i>
        <i class="fa-solid fa-l red"></i>
    </div>

</div>

</body>
</html>
